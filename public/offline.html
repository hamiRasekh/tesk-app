<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0b14" />
    <title>Aveno — بدون اینترنت</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, Vazirmatn, system-ui, sans-serif;
        background: #0d0b14;
        color: #e4e1e7;
      }
      .card {
        max-width: 360px;
        width: 100%;
        text-align: center;
        padding: 28px 22px;
        border-radius: 20px;
        border: 1px solid rgba(139, 92, 246, 0.35);
        background: rgba(19, 16, 28, 0.96);
        box-shadow: 0 0 32px rgba(98, 0, 238, 0.2);
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
        color: #cfbdff;
      }
      p {
        margin: 0 0 20px;
        font-size: 0.9rem;
        line-height: 1.55;
        color: #cbc3d9;
      }
      a {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 999px;
        background: #6200ee;
        color: #cfbdff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon.png" alt="Aveno" />
      <h1>اینترنت قطع است</h1>
      <p>
        نگران نباش — اگر قبلاً وارد شده‌ای، تسک‌ها و پروژه‌های ذخیره‌شده روی دستگاهت در دسترس هستند.
      </p>
      <a href="/dashboard">ادامه با Aveno</a>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.ready.then(function () {
          if (location.search.indexOf("retry") === -1) {
            setTimeout(function () {
              location.replace("/dashboard");
            }, 400);
          }
        });
      }
    </script>
  </body>
</html>
