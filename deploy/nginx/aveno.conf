# Nginx + HTTPS for native PWA (no browser URL bar on Android)
#
# Without HTTPS, "Add to Home Screen" only creates a browser shortcut — NOT a real app.
#
# Setup (needs a domain pointing to this server):
#   1) sudo apt install nginx certbot python3-certbot-nginx
#   2) sudo cp deploy/nginx/aveno.conf /etc/nginx/sites-available/aveno
#   3) Edit server_name in the file → your domain
#   4) sudo ln -sf /etc/nginx/sites-available/aveno /etc/nginx/sites-enabled/
#   5) sudo nginx -t && sudo systemctl reload nginx
#   6) sudo certbot --nginx -d YOUR_DOMAIN
#   7) Update .env:
#        PUBLIC_URL=https://YOUR_DOMAIN
#   8) Restart backend + frontend
#
# HTTP → HTTPS redirect is included in the config.

upstream aveno_frontend {
    server 127.0.0.1:3314;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot fills these paths:
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://aveno_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
