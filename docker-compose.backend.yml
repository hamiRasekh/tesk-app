# Backend + DB only — frontend runs on host via npm (scripts/deploy-frontend.sh)
# Usage: docker compose -f docker-compose.backend.yml --env-file .env up --build -d

services:
  db:
    image: postgres:16-alpine
    container_name: aveno-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-void}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-void_spirit}
    volumes:
      - aveno_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-void} -d ${POSTGRES_DB:-void_spirit}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - aveno_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aveno-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-void}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-void_spirit}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-525600}
      CORS_ORIGINS: ${PUBLIC_URL:?Set PUBLIC_URL in .env}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aveno_internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

networks:
  aveno_internal:
    driver: bridge

volumes:
  aveno_pg_data:
