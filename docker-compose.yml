services:
  db:
    image: postgres:16-alpine
    container_name: aveno-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: void
      POSTGRES_PASSWORD: void
      POSTGRES_DB: void_spirit
    ports:
      - "5432:5432"
    volumes:
      - void_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U void -d void_spirit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        USE_IRAN_MIRRORS: ${USE_IRAN_MIRRORS:-false}
    container_name: aveno-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://void:void@db:5432/void_spirit
      SECRET_KEY: aveno-docker-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: "525600"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: aveno-web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  void_pg_data:
